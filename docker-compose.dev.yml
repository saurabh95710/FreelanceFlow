version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ff_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: freelance
      POSTGRES_PASSWORD: freelance_secret
      POSTGRES_DB: freelanceflow_dev
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freelance"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: ff_backend_dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://freelance:freelance_secret@postgres:5432/freelanceflow_dev
      JWT_SECRET: dev_jwt_secret_at_least_32_chars_long
      JWT_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost:5173
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
    ports:
      - "4000:4000"

volumes:
  postgres_dev_data: